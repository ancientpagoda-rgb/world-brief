<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Earth Globe Widget — Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0d0f; color: #c0d0d8; font-family: 'IBM Plex Mono', monospace; display: flex; flex-direction: column; align-items: center; padding: 24px; }
  h1 { font-size: 1.2rem; font-weight: 400; color: #95ffb8; margin-bottom: 4px; }
  p { font-size: 0.85rem; color: rgba(200,220,240,0.5); margin-bottom: 24px; }
  #globe-a { width: 100%; max-width: 600px; margin-bottom: 32px; }
  #globe-b { width: 100%; max-width: 400px; }
  .row { display: flex; gap: 24px; flex-wrap: wrap; justify-content: center; width: 100%; max-width: 900px; }
</style>
</head>
<body>
  <h1>earth-globe-widget</h1>
  <p>Embeddable Canvas 2D Earth — zero dependencies</p>

  <div id="globe-a"></div>

  <div class="row">
    <div id="globe-b"></div>
    <div id="globe-c" style="max-width:300px"></div>
  </div>

  <script src="../dist/earth-globe.min.js"></script>
  <script>
    var base = "../";

    GlobeWidget.mount('#globe-a', {
      height: 500,
      starsUrl: base + "stars.json"
    });

    GlobeWidget.mount('#globe-b', {
      height: 300,
      weather: true,
      stars: false,
      starsUrl: base + "stars.json"
    });

    GlobeWidget.mount('#globe-c', {
      height: 300,
      nightLights: false,
      borders: false,
      starsUrl: base + "stars.json"
    });
  </script>
</body>
</html>
