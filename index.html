<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>World</title>
    <meta
      name="description"
      content="World is a browser-based celestial globe with live weather and country headlines."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <canvas id="starfield-canvas" class="starfield-canvas"></canvas>
    <div id="build-tag" class="build-tag"></div>
    <main>
      <canvas
        id="weather-orb-canvas"
        class="weather-orb-canvas"
        width="960"
        height="960"
        aria-label="Rotating earth weather simulation"
      ></canvas>
      <div id="country-list" class="country-list" aria-live="polite"></div>
    </main>

    <script>
      (async () => {
        // Cache-bust app.js using earth-live.json (updated by CI).
        // This avoids users getting stuck on a stale cached app.js on GitHub Pages.
        let v = "";
        try {
          const meta = await fetch("./earth-live.json", { cache: "no-store" }).then((r) => r.json());
          v = (typeof meta?.generatedAt === "string" && meta.generatedAt) || (typeof meta?.requestedTime === "string" && meta.requestedTime) || "";
        } catch {
          v = String(Date.now());
        }

        // app.js changes more frequently than earth-live.json; always bust it.
        const appV = String(Date.now());
        const s = document.createElement("script");
        s.src = `./app.js?v=${encodeURIComponent(appV)}`;
        document.body.appendChild(s);

        const tag = document.getElementById("build-tag");
        if (tag) tag.textContent = `World v1.0.0\nbuild ${v || ""}${v ? " | " : ""}app ${appV}`;
      })();
    </script>
  </body>
</html>
