name: Update World Data

on:
  workflow_dispatch:
  schedule:
    - cron: "25 2 * * 0"

permissions:
  contents: write

concurrency:
  group: update-world-data
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Update population only
        run: python scripts/update_population_only.py

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- world-data.json; then
            echo "No changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add world-data.json
          git commit -m "chore: update world-data population"
          git push
