name: Update Earth Live Texture

on:
  workflow_dispatch:
  schedule:
    - cron: "40 3 * * *"

permissions:
  contents: write

concurrency:
  group: update-earth-live-texture
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate texture
        run: python scripts/update_earth_live_texture.py

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- earth-live.jpg earth-live.json; then
            echo "No changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add earth-live.jpg earth-live.json
          git commit -m "chore: update earth live texture"
          git push
