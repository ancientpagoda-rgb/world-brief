name: Update NOAA Weather Grid

on:
  workflow_dispatch:
  schedule:
    - cron: "15 */6 * * *"

permissions:
  contents: write

concurrency:
  group: update-noaa-weather-grid
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: python -m pip install --upgrade pip && python -m pip install eccodes numpy pillow

      - name: Generate grid
        run: python scripts/update_noaa_weather_grid.py

      - name: Build raster overlays
        run: python scripts/build_weather_rasters.py

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- noaa-weather-grid.json weather-temp.png weather-precip.png weather-rasters.json; then
            echo "No changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add noaa-weather-grid.json weather-temp.png weather-precip.png weather-rasters.json
          git commit -m "chore: update NOAA weather grid + rasters"
          git push
